name: Go

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25.x','1.26.x']

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install lib dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libgl1-mesa-dev xorg-dev libxkbcommon-dev

      - name: Download dependencies
        run: go mod tidy

      - name: Build desktop app
        run: go build -o repo-hopper ./cmd/desktop/

      - name: Build CLI
        run: go build -o repo-hopper-cli ./cmd/cli/

      - name: Test
        run: go test -v ./...
