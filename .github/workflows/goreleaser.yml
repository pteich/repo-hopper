name: goreleaser

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  # ─── Linux release via GoReleaser ──────────────────────────────────────────
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'

      - name: Install lib dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libx11-xcb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxcursor-dev \
            libxfixes-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libvulkan-dev \
            libwayland-dev \
            xorg-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libpango1.0-dev \
            libcairo2-dev

      - name: Download Syft
        uses: anchore/sbom-action/download-syft@v0.17.4

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        timeout-minutes: 60
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean -p 1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_GORELEASER }}
          GOMAXPROCS: 2

  # ─── macOS native build & upload ───────────────────────────────────────────
  # Runs in parallel with goreleaser — softprops/action-gh-release creates the
  # draft release if it doesn't exist yet, so no needs: dependency required.
  release-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        goarch: [ amd64, arm64 ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'

      - name: Install gogio
        run: go install gioui.org/cmd/gogio@latest

      - name: Build macOS .app bundle
        run: |
          TAG=${{ github.ref_name }}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(git log -1 --format=%cI)
          LDFLAGS="-s -w -X main.version=${TAG} -X main.commit=${COMMIT} -X main.date=${DATE}"
          gogio -target macos -arch ${{ matrix.goarch }} -ldflags "${LDFLAGS}" -icon appicon.png -o RepoHopper.app ./cmd/desktop/
          # gogio may nest the real bundle inside a wrapper; handle both cases
          INNER="RepoHopper.app/RepoHopper_${{ matrix.goarch }}.app"
          if [ -d "$INNER" ]; then
            mv "$INNER" RepoHopper-darwin-${{ matrix.goarch }}.app
            rm -rf RepoHopper.app
          else
            mv RepoHopper.app RepoHopper-darwin-${{ matrix.goarch }}.app
          fi
          # Ad-hoc sign so the bundle can run without an Apple certificate
          codesign --force --deep --sign - RepoHopper-darwin-${{ matrix.goarch }}.app
          zip -r RepoHopper-darwin-${{ matrix.goarch }}.zip RepoHopper-darwin-${{ matrix.goarch }}.app

      - name: Upload macOS artifact to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: RepoHopper-darwin-${{ matrix.goarch }}.zip
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_GORELEASER }}

  # ─── Windows native build & upload ─────────────────────────────────────────
  release-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        goarch: [ amd64, arm64 ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'

      - name: Install gogio
        run: go install gioui.org/cmd/gogio@latest

      - name: Build Windows executable
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        shell: bash
        run: |
          TAG=${{ github.ref_name }}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(git log -1 --format=%cI)
          LDFLAGS="-s -w -X main.version=${TAG} -X main.commit=${COMMIT} -X main.date=${DATE}"
          gogio -target windows -arch ${{ matrix.goarch }} -ldflags "${LDFLAGS}" -icon appicon.png -o repo-hopper-windows-${{ matrix.goarch }}.exe ./cmd/desktop/

      - name: Zip artifact
        shell: bash
        run: |
          7z a repo-hopper-windows-${{ matrix.goarch }}.zip repo-hopper-windows-${{ matrix.goarch }}.exe

      - name: Upload Windows artifact to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: repo-hopper-windows-${{ matrix.goarch }}.zip
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_GORELEASER }}
