# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

before:
  hooks:
    - go mod tidy
    - go install gioui.org/cmd/gogio@latest

builds:
  # GoReleaser runs on Linux — it builds the Linux binary directly.
  # macOS and Windows are built by separate native runner jobs in goreleaser.yml
  # and uploaded to the same draft release.
  - main: ./cmd/desktop
    id: "desktop"
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.CommitDate}}
    # No post-hook needed — the plain binary is the final Linux artifact.



archives:
  - id: desktop
    ids: [ desktop ]
    formats: [ tar.gz ]
    name_template: "repo-hopper_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md


checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - typo
      - Goreleaser
      - Dockerfile
      - CI
      - '^test:'

sboms:
  - artifacts: archive

nfpms:
  - ids: [ desktop ]
    file_name_template: "{{ .ConventionalFileName }}"
    formats:
      - deb
      - rpm
      - apk
      - archlinux
    maintainer: "Peter Teich <mail@peter-teich.de>"
    vendor: "Peter Teich"
    homepage: "https://github.com/pteich/repo-hopper"
    description: "GUI application for managing and navigating GitHub repositories."
    license: "MIT"



release:
  draft: true
  replace_existing_draft: true
  replace_existing_artifacts: true
