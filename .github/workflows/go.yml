name: Go

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        # GitHub provides free native runners for all three OS for public repos
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        go-version: [ '1.25.x', '1.26.x' ]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install lib dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libx11-xcb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxcursor-dev \
            libxfixes-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libvulkan-dev \
            libwayland-dev \
            xorg-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libpango1.0-dev \
            libcairo2-dev

      # macOS ships with the Metal framework; no extra deps needed.
      # Xcode Command Line Tools are pre-installed on macos-latest runners.

      - name: Download dependencies
        run: go mod tidy

      - name: Build desktop app
        run: go build -o repo-hopper${{ runner.os == 'Windows' && '.exe' || '' }} ./cmd/desktop/

      - name: Build CLI
        run: go build -o repo-hopper-cli${{ runner.os == 'Windows' && '.exe' || '' }} ./cmd/cli/

      - name: Test
        run: go test -v ./...
